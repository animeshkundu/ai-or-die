name: Release on main

# INTENTIONAL auto-trigger on push to main.
# Per user directive (2026-05-27), CI and Voice workflows were narrowed to
# PR-only to avoid fan-out on every push. This release workflow is the one
# exception: it must fire on main push to auto-tag, publish to npm, and
# build release binaries. DO NOT convert this to PR-only or manual.
on:
  push:
    branches: [ main ]

concurrency:
  group: release-on-main
  cancel-in-progress: false

jobs:
  # Build + publish the content-addressed mesh sidecar BEFORE the npm release, so
  # npm never advertises a package whose pinned `mesh-<hash>` release is missing
  # or incomplete. Idempotent: skips the Go build when the release already exists
  # with ALL expected assets matching the lock; otherwise builds, uploads to a
  # DRAFT release, verifies, then finalizes (the atomic "ready" marker).
  mesh-sidecar:
    name: Mesh sidecar (content-addressed)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compute content hash + verify lock is current
        id: hash
        run: |
          node scripts/mesh-lock.js --check
          HASH=$(node scripts/mesh-lock.js --print-hash)
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "tag=mesh-${HASH}" >> "$GITHUB_OUTPUT"

      # The workflow-level `concurrency: release-on-main` group (cancel-in-progress:
      # false) serializes ALL release-on-main runs, so the feature-push run and
      # the auto-bump-push run never execute this job concurrently — no two runs
      # race on the same mesh-<hash> tag/release/assets.
      - name: Check existing release completeness
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="mesh-${{ steps.hash.outputs.hash }}"
          # Expected asset names are the fixed platform matrix (NOT the committed
          # lock, whose hashes may be empty in-repo), plus the checksums file.
          mapfile -t WANT < <(node -e "console.log(require('./scripts/mesh-lock.js').ASSET_NAMES.join('\n'))")
          WANT+=("ai-or-die-mesh-checksums.txt")
          if ! gh release view "$TAG" --json assets,isDraft > /tmp/rel.json 2>/dev/null; then
            echo "complete=false" >> "$GITHUB_OUTPUT"; echo "release $TAG absent — build required"; exit 0
          fi
          # A draft is not publicly downloadable (installer + embed both fail), so
          # treat a leftover draft from a crashed run as incomplete → recreate.
          if [ "$(jq -r '.isDraft' /tmp/rel.json)" = "true" ]; then
            echo "complete=false" >> "$GITHUB_OUTPUT"; echo "release $TAG is a draft — recreating"; exit 0
          fi
          jq -r '.assets[].name' /tmp/rel.json > /tmp/have.txt
          MISSING=0
          for a in "${WANT[@]}"; do
            grep -qx "$a" /tmp/have.txt || { echo "missing asset: $a"; MISSING=1; }
          done
          if [ "$MISSING" -eq 0 ]; then echo "complete=true" >> "$GITHUB_OUTPUT"; echo "release $TAG complete — skipping build"; else echo "complete=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/setup-go@v5
        if: steps.check.outputs.complete != 'true'
        with:
          go-version: '1.23'

      - name: Cross-build sidecar + checksums
        if: steps.check.outputs.complete != 'true'
        run: bash scripts/build-mesh-sidecar.sh

      - name: Publish sidecar release (draft → verify → finalize)
        if: steps.check.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="mesh-${{ steps.hash.outputs.hash }}"
          # Only reached when the release is absent / draft / incomplete (a
          # complete one is skipped above), so delete+recreate never destroys a
          # healthy published release; the brief tag-absent window is harmless
          # because npm publish is gated behind this job (needs: mesh-sidecar).
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" --draft --title "$TAG" --notes "ai-or-die-mesh sidecar ${{ steps.hash.outputs.hash }}"
          gh release upload "$TAG" dist/mesh/ai-or-die-mesh-* --clobber
          # Verify every expected asset is present on the draft before finalizing.
          gh release view "$TAG" --json assets -q '.assets[].name' > /tmp/have.txt
          for a in $(node -e "console.log(require('./scripts/mesh-lock.js').ASSET_NAMES.join(' '))") ai-or-die-mesh-checksums.txt; do
            grep -qx "$a" /tmp/have.txt || { echo "::error::asset $a missing from draft $TAG"; exit 1; }
          done
          gh release edit "$TAG" --draft=false
          echo "finalized $TAG"

  release:
    name: Tag, Release, and Publish
    needs: mesh-sidecar
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      released: ${{ steps.version.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Check if tag exists and bump if needed
        id: version
        run: |
          git fetch --tags --force --quiet
          CURRENT="${{ steps.pkg.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/v${CURRENT}" >/dev/null; then
            echo "Tag v${CURRENT} exists — auto-bumping patch version..."
            npm version patch --no-git-tag-version
            NEW=$(jq -r .version package.json)
            git add package.json package-lock.json
            git commit -m "chore: bump version to ${NEW}"
            git push
            echo "version=${NEW}" >> $GITHUB_OUTPUT
          else
            echo "version=${CURRENT}" >> $GITHUB_OUTPUT
          fi
          echo "released=true" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          git fetch --tags --force --quiet
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          FEATS=$(git log $RANGE --pretty="format:- %s" --extended-regexp --grep="^feat(\(|:)" || true)
          FIXES=$(git log $RANGE --pretty="format:- %s" --extended-regexp --grep="^fix(\(|:)" || true)
          DOCS=$(git log $RANGE --pretty="format:- %s" --extended-regexp --grep="^docs(\(|:)" || true)
          CHORES=$(git log $RANGE --pretty="format:- %s" --extended-regexp --grep="^(chore|refactor|test)(\(|:)" || true)

          BODY=""

          if [ -n "$FEATS" ]; then
            BODY="${BODY}## What's New\n\n${FEATS}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug Fixes\n\n${FIXES}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            BODY="${BODY}## Documentation\n\n${DOCS}\n\n"
          fi
          if [ -n "$CHORES" ]; then
            BODY="${BODY}## Maintenance\n\n${CHORES}\n\n"
          fi

          if [ -z "$BODY" ]; then
            COMMITS=$(git log $RANGE --pretty="format:- %s" --no-merges)
            BODY="## Changes\n\n${COMMITS}\n\n"
          fi

          BODY="${BODY}---\n\n"
          BODY="${BODY}**Install:** \`npx ai-or-die\` or \`npm install -g ai-or-die\`\n\n"
          BODY="${BODY}**Binaries:** Linux x64 and Windows x64 attached below (no Node.js required).\n\n"
          BODY="${BODY}**Full changelog:** [CHANGELOG.md](https://github.com/animeshkundu/ai-or-die/blob/main/CHANGELOG.md)"

          echo "body<<EOFNOTES" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOFNOTES" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Embed sidecar checksums into the lock (ships in the npm tarball)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="mesh-${{ needs.mesh-sidecar.outputs.hash }}"
          gh release download "$TAG" --pattern ai-or-die-mesh-checksums.txt --dir /tmp --clobber
          node scripts/mesh-lock.js --embed /tmp/ai-or-die-mesh-checksums.txt
          # Gate publish on a fully-valid lock: all 6 platform checksums present,
          # each a real sha256, and contentHash still current.
          node scripts/mesh-lock.js --assert-complete

      - name: Publish to npm
        run: |
          # Unset token auth so npm v11 uses OIDC trusted publishing.
          # npx bypasses the broken bundled npm v10 (can't self-upgrade).
          unset NODE_AUTH_TOKEN
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          npx --yes npm@11 publish --access public --provenance

      - name: Setup Node.js (GitHub Packages)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@animeshkundu'

      - name: Publish to GitHub Packages
        continue-on-error: true
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@animeshkundu/ai-or-die';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public
          git checkout -- package.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build ${{ matrix.artifact }}
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: ai-or-die-linux-x64
          - os: windows-latest
            platform: win32
            artifact: ai-or-die-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Build SEA binary
        run: node scripts/build-sea.js

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win32" ]; then
            mv dist/ai-or-die.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/ai-or-die "dist/${{ matrix.artifact }}"
            chmod +x "dist/${{ matrix.artifact }}"
          fi

      - name: Smoke test
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win32" ]; then
            ./dist/${{ matrix.artifact }} --help || true
          else
            ./dist/${{ matrix.artifact }} --help || true
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: dist/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


name: Build Binaries

# Trigger policy (per ci-trigger-architecture.md, 2026-05-28):
#   - PR label `run-binaries` — apply via `gh pr edit <N> --add-label run-binaries`
#     to build a SEA binary for the PR head and download it from the run.
#   - workflow_dispatch — manual build against a tag/branch.
#
# NOTE: the `release: types: [published]` trigger was REMOVED — the release
# pipeline (`.github/workflows/release-on-main.yml`) already builds + uploads
# Linux/Windows SEA binaries to the release tag in its own `build-binaries`
# job, so a second auto-trigger here was duplicative. If release-on-main.yml
# ever drops its build matrix, restore `release: types: [published]` here.
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0) — workflow_dispatch only'
        required: false

concurrency:
  group: build-binaries-${{ github.event.pull_request.number || github.event.inputs.version || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    # Only fire on the matching label (or any non-PR trigger).
    if: github.event_name != 'pull_request' || github.event.label.name == 'run-binaries'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact: ai-or-die-linux-x64
          - os: windows-latest
            platform: win32
            arch: x64
            artifact: ai-or-die-windows-x64.exe

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build SEA binary
        run: node scripts/build-sea.js

      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win32" ]; then
            mv dist/ai-or-die.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/ai-or-die "dist/${{ matrix.artifact }}"
            chmod +x "dist/${{ matrix.artifact }}"
          fi

      - name: Smoke test
        shell: bash
        run: |
          ./dist/${{ matrix.artifact }} --version || true
          ./dist/${{ matrix.artifact }} --help || true

      # Upload artifact for PR-label runs AND workflow_dispatch runs. Both
      # produce a downloadable build the user can grab from the run page.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 14

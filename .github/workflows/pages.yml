name: Deploy to GitHub Pages

# INTENTIONAL auto-trigger on push to main, scoped to `site/**`.
# Per ci-trigger-architecture.md, this is the SECOND of two allowed
# auto-trigger exceptions (release-on-main.yml is the first). The
# paths: [site/**] filter means it does NOT fan out on every push —
# it fires only when the docs-site content actually changes.
# DO NOT widen the paths filter or remove it without re-reading the design doc.
on:
  push:
    branches: [main]
    paths: [site/**]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Install Playwright WebKit
        # WebKit engine (closest to iOS Edge). Retry: the browser CDN download
        # flakes intermittently. bash works on ubuntu and Windows (Git Bash).
        shell: bash
        run: |
          for i in 1 2 3; do
            npx playwright install webkit --with-deps && exit 0

      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Package smoke test
        run: node scripts/smoke-test-package.js

  build-binary:
    name: build-binary (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: ai-or-die-linux-x64
          - os: windows-latest
            platform: win32
            artifact: ai-or-die-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build SEA binary
        run: node scripts/build-sea.js
      - name: Smoke test (--help)
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win32" ]; then
            ./dist/ai-or-die.exe --help || true
          else
            chmod +x ./dist/ai-or-die
            ./dist/ai-or-die --help || true
          fi
      - name: E2E test against binary
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win32" ]; then
            node scripts/smoke-test-binary.js ./dist/ai-or-die.exe
          else
            node scripts/smoke-test-binary.js ./dist/ai-or-die
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact || 'ai-or-die*' }}

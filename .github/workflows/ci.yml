name: CI

# Trigger policy (per user directive, 2026-05-27): PR-only.
# Avoid auto-fanout on every push — feature-branch pushes are throwaway
# and main-push CI is redundant with the PR run that just merged.
# Release/publish on main push lives in release-on-main.yml.
# Use workflow_dispatch for manual re-runs (e.g. retry a flaky job).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-main-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # Compile-check the Go mesh sidecar on PRs (the release workflow only builds it
  # on push to main, so without this a Go break would not surface until release).
  mesh-sidecar-build:
    name: mesh-sidecar-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: go mod tidy + vet + test + build
        working-directory: mesh
        run: |
          go mod tidy
          go vet ./...
          go test ./...
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=ci" -o /tmp/aiordie-mesh .
          echo "mesh sidecar built OK"

  test:
    # Explicit name so branch protection can reliably reference the check
    # context as "CI / test (ubuntu-latest)" etc. (See
    # docs/audits/ci-branch-protection-checklist.md.)
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      # The mesh sidecar's contentHash must match its committed lock. This is the
      # deterministic, un-bypassable build-signal: change mesh/ source without
      # regenerating the lock and CI fails here (run `npm run mesh:lock`).
      - name: Verify mesh sidecar lock is current
        run: node scripts/mesh-lock.js --check
      # Verify the @vscode/ripgrep postinstall succeeded — fail CI fast
      # with an actionable message instead of letting 50 spec failures
      # downstream obscure the root cause (corp proxy blocked the
      # postinstall fetch, --ignore-scripts ran, antivirus quarantined
      # the binary, etc.). See ADR-0018.
      - name: Verify bundled ripgrep
        run: node -e "const p = require('@vscode/ripgrep').rgPath; require('fs').accessSync(p, require('fs').constants.X_OK); console.log('rg OK:', p)"
      - run: npm test
      - run: npm audit --audit-level=moderate
        continue-on-error: true

  # Warm the STT model cache ONCE before the browser jobs so none of them pay
  # the ~640MB on-demand download inside their per-job budget (a timed-out job
  # never saves the cache, so per-job-only caching could never self-warm the
  # slow jobs). Browser jobs `needs: prewarm-models` and then just restore.
  prewarm-models:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Prewarm STT model cache
        uses: ./.github/actions/cache-models
        with:
          models: stt

  test-browser-golden:
    runs-on: ${{ matrix.os }}
    needs: prewarm-models
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        # Retry: the browser CDN download flakes intermittently (exit 100 /
        # mid-install cancellation) and a single failure sinks the whole job.
        # bash works on both ubuntu and the Windows runners (Git Bash).
        shell: bash
        run: |
          for i in 1 2 3; do
            npx playwright install chromium --with-deps && exit 0
            echo "::warning::playwright install attempt $i failed; retrying in 10s"; sleep 10
          done
          exit 1
      - name: Restore local models (STT, cached)
        uses: ./.github/actions/cache-models
        with:
          models: stt
      - name: Run golden path test
        run: npx playwright test --config e2e/playwright.config.js --project golden-path
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-golden-${{ matrix.os }}
          path: |
            e2e/test-results/
            playwright-report/
          retention-days: 14


          path: |
            ~/.cache/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        # Retry: the browser CDN download flakes intermittently (exit 100 /
        # mid-install cancellation) and a single failure sinks the whole job.
        # bash works on both ubuntu and the Windows runners (Git Bash).
        shell: bash
        run: |
          for i in 1 2 3; do
            npx playwright install chromium --with-deps && exit 0
            echo "::warning::playwright install attempt $i failed; retrying in 10s"; sleep 10
          done
          exit 1
      - name: Restore local models (STT, cached)
        uses: ./.github/actions/cache-models
        with:
          models: stt
